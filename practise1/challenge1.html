<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact form</title>
    <link rel="stylesheet" href="contactform.css">
</head>
<body>
    
    <div class="container">
        
        <h1 class="main_heading"><img class="clip_path" src="img2.jfif"><br>Contact Us</h1>
        
        <p>Name: <input type="text" name="name" id="name" required placeholder="Enter Name"></p>
        <p>Email: <input type="email" name="email" id="email" required placeholder="jhon123@gmail.com"></p>
        <p>Phone Number: <small>&lpar;optional&rpar;</small><input type="number" name="number" id="no" required placeholder="+92"></p>
        <p>Message:<textarea name="message" id="msg" placeholder="Enter Message"></textarea></p>
        <input type="button" value="Submit">
       
    </div>
</body>
</html>
